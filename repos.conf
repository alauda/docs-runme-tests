# 文档仓库注册表
#
# 格式: <project>:<doc-repo-path>
# - 路径相对 docs-runme-tests 仓库根，或写绝对路径
# - 可用环境变量 <PROJECT>_REPO_ROOT 覆盖（如 MESH_REPO_ROOT=/abs/path）
# - 目录不存在的条目会被静默跳过（兼容只 clone 了部分仓库的场景）
#
# 新增文档项目：在此加一行 + 新增 projects/<name>/project.sh + run-<name>-all.sh

